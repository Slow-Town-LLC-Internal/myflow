name: Generate and Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'cmd/doc-generator/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build doc-generator
        run: |
          cd cmd/doc-generator
          go build -o doc-generator

      - name: Create images directory
        run: |
          # Create images directory in docs if it doesn't exist
          mkdir -p docs/images

      - name: Generate documentation
        run: |
          cd cmd/doc-generator
          # Remove the -base-url flag since we're handling the path physically
          ./doc-generator -root ${{ github.workspace }}

      - name: Verify output structure
        run: |
          echo "Listing public directory structure:"
          find public -type d | sort
          echo "Checking for images directory:"
          ls -la public/images || echo "Images directory not found!"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
