name: Generate and Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'cmd/doc-generator/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build doc-generator
        run: |
          cd cmd/doc-generator
          go build -o doc-generator

      - name: Generate documentation
        run: |
          cd cmd/doc-generator
          ./doc-generator -root ${{ github.workspace }} -base-url /myflow


      - name: Reorganize static files
        run: |
          # Create myflow directory if it doesn't exist
          mkdir -p public/myflow

          # Move static assets into myflow directory
          mv public/css public/myflow/
          mv public/js public/myflow/
          mv public/images public/myflow/

          # Move index.html to myflow directory if it's not already there
          if [ -f public/index.html ]; then
            mv public/index.html public/myflow/index.html
          fi

          # Create a redirect at root
          echo '<meta http-equiv="refresh" content="0;url=myflow/">' > public/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
