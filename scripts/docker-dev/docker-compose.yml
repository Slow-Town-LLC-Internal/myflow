services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-environment
    ports:
      - "2222:22"  # SSH
      - "8080:8080"  # For web development
    volumes:
      - .:/workspace
      - ~/.ssh:/root/.ssh:ro  # Mount SSH keys
      - ./config:/etc/dev-config:ro  # Mount configuration directory
      - go-cache:/root/go
      - npm-cache:/root/.npm
      - pip-cache:/root/.cache/pip
      - venv:/root/adminvenv
      - git-config:/root/.gitconfig:ro  # Mount git configuration
    environment:
      - TZ=UTC
      - LANG=en_US.UTF-8
      - TERM=xterm-256color
      - EDITOR=nvim
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/root/go/bin
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "sshd"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:14-alpine
    container_name: dev-postgres
    environment:
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=devpass
      - POSTGRES_DB=devdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d devdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  dev-network:
    driver: bridge

volumes:
  go-cache:
    driver: local
  npm-cache:
    driver: local
  pip-cache:
    driver: local
  venv:
    driver: local
  postgres-data:
    driver: local
  git-config:
    driver: local
