bind -T prefix r source-file ~/.tmux.conf; display 'Config Reloaded!'
set-option -sg escape-time 10
set-option -g focus-events on
set-option -g default-terminal "xterm-256color"
#set-option -g default-terminal "kitty"
#set -g allow-passthrough

set -g history-limit 300000
set -g default-shell "/usr/bin/bash"
bind-key P command-prompt -p 'save history to filename:'  -I '~/.tmux.history' 'capture-pane -S -300000 ; save-buffer %1 ; delete-buffer'

setw -g mode-keys emacs

set -g allow-rename off
set -g visual-activity off
set -g visual-bell off
setw -g	monitor-activity off
set -g bell-action none

setw -g	clock-mode-colour colour143
setw -g mode-style 'fg=colour1 bg=colour8 bold'
setw -g pane-border-style 'fg=colour8 dim'
setw -g pane-active-border-style 'fg=colour3'
set -g status-position bottom
set -g status-justify right
#set -g status-style 'fg=colour137 bg=colour16 dim'
set -g status-style 'fg=colour137 bg=colour8 dim'
set -g status-right ''
set -g status-left '#[fg=colour233,bg=colour8] %Y-%m-%d %a #[fg=colour233,bg=colour8]%T'
set -g status-right-length 20
set -g status-left-length 50
setw -g window-status-current-style 'fg=colour1 bg=colour8 bold'
setw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '
setw -g window-status-style 'fg=colour9 bg=colour17'
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '
setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'
set -g message-style 'fg=colour232 bg=colour8 bold'


bind -n M-Left 		select-pane -L
bind -n M-Right 	select-pane -R
bind -n M-Up 		  select-pane -U
bind -n M-Down 		select-pane -D

# mkdir -p ~/.tmux/plugins/tpm
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
run '~/.tmux/plugins/tpm/tpm'

